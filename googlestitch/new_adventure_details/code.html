<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kinetic Fairway - Create New Adventure</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-dim": "#005d22",
                    "inverse-surface": "#0b0f0e",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed": "#ffc5aa",
                    "tertiary-fixed-dim": "#77a1ff",
                    "on-tertiary": "#f0f2ff",
                    "on-primary-fixed-variant": "#006827",
                    "on-primary": "#cfffce",
                    "outline-variant": "#abaeac",
                    "inverse-on-surface": "#9b9d9c",
                    "on-secondary-fixed": "#5c2300",
                    "surface-tint": "#006a28",
                    "on-primary-container": "#005d22",
                    "background": "#f5f7f5",
                    "surface-container": "#e6e9e7",
                    "surface-variant": "#d9dedb",
                    "on-background": "#2c2f2e",
                    "on-surface-variant": "#595c5b",
                    "on-error": "#ffefee",
                    "on-tertiary-fixed-variant": "#003580",
                    "secondary-fixed-dim": "#ffb28c",
                    "inverse-primary": "#5cfd80",
                    "on-surface": "#2c2f2e",
                    "surface-container-high": "#e0e3e1",
                    "on-secondary": "#fff0ea",
                    "error-dim": "#9f0519",
                    "tertiary": "#0055c4",
                    "secondary-dim": "#883700",
                    "tertiary-fixed": "#8eafff",
                    "primary-fixed-dim": "#4bee74",
                    "outline": "#747776",
                    "on-tertiary-fixed": "#00163d",
                    "error-container": "#fb5151",
                    "on-secondary-fixed-variant": "#893700",
                    "secondary": "#9b3f00",
                    "surface-container-highest": "#d9dedb",
                    "secondary-container": "#ffc5aa",
                    "surface": "#f5f7f5",
                    "primary-container": "#5cfd80",
                    "surface-dim": "#d1d5d3",
                    "on-primary-fixed": "#004819",
                    "tertiary-container": "#8eafff",
                    "primary-fixed": "#5cfd80",
                    "primary": "#006a28",
                    "on-secondary-container": "#7b3100",
                    "on-tertiary-container": "#002d6f",
                    "surface-container-low": "#eff1ef",
                    "on-error-container": "#570008",
                    "surface-bright": "#f5f7f5",
                    "error": "#b31b25",
                    "tertiary-dim": "#004aad"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface selection:bg-primary-container selection:text-primary min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f5f7f5] dark:bg-[#1a1c1a] flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#006a28] dark:text-[#5cfd80]" data-icon="sports_golf">sports_golf</span>
<span class="text-xl font-black text-[#006a28] dark:text-[#5cfd80] tracking-tighter font-['Plus_Jakarta_Sans']">Kinetic Fairway</span>
</div>
<button class="material-symbols-outlined text-[#2c2f2e] dark:text-[#e6e9e7] hover:opacity-80 transition-opacity active:scale-95 duration-150" data-icon="close">close</button>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">
<!-- Hero Illustration / Header Area -->
<div class="relative mb-12">
<div class="absolute -top-4 -left-4 w-24 h-24 bg-primary-container rounded-full opacity-20 blur-2xl"></div>
<div class="absolute -bottom-8 -right-4 w-32 h-32 bg-secondary-container rounded-full opacity-20 blur-2xl"></div>
<h1 class="text-[2.5rem] font-extrabold leading-tight tracking-tight text-on-surface mb-2">
                New Adventure
            </h1>
<p class="text-on-surface-variant font-medium">Step 1: Set the Foundation</p>
</div>
<!-- Form Section -->
<div class="space-y-8">
<!-- Course Name Input -->
<section class="space-y-4">
<label class="block text-[0.75rem] font-bold uppercase tracking-[0.05em] text-on-surface pl-2">Course Name</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none rounded-lg p-6 text-xl font-bold placeholder:text-outline-variant focus:ring-4 focus:ring-primary-container transition-all shadow-[0_4px_24px_rgba(0,0,0,0.04)]" placeholder="e.g. Neon Jungle Peaks" type="text"/>
<div class="absolute right-6 top-1/2 -translate-y-1/2 opacity-20 group-focus-within:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="edit">edit</span>
</div>
</div>
</section>
<!-- Number of Holes Selection -->
<section class="space-y-4">
<label class="block text-[0.75rem] font-bold uppercase tracking-[0.05em] text-on-surface pl-2">Number of Holes</label>
<div class="grid grid-cols-2 gap-4">
<!-- Option 9 -->
<button class="relative overflow-hidden group bg-surface-container-lowest p-6 rounded-lg text-left transition-all active:scale-95 shadow-[0_4px_24px_rgba(0,0,0,0.04)] ring-4 ring-primary-container">
<div class="absolute top-0 right-0 w-24 h-24 bg-primary-container/10 rounded-full translate-x-8 -translate-y-8"></div>
<span class="block text-4xl font-extrabold text-primary mb-1">9</span>
<span class="text-sm font-bold text-on-surface-variant">Standard Half</span>
<div class="absolute top-4 right-4 bg-primary text-on-primary rounded-full p-1 leading-none">
<span class="material-symbols-outlined text-sm" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</button>
<!-- Option 18 -->
<button class="relative overflow-hidden group bg-surface-container-high p-6 rounded-lg text-left transition-all hover:bg-surface-container-lowest active:scale-95 shadow-none hover:shadow-[0_4px_24px_rgba(0,0,0,0.04)]">
<span class="block text-4xl font-extrabold text-on-surface-variant mb-1 group-hover:text-primary">18</span>
<span class="text-sm font-bold text-on-surface-variant">Full Course</span>
</button>
</div>
<!-- Custom Input -->
<div class="mt-4 flex items-center gap-4 bg-surface-container-low p-4 rounded-lg">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="tune">tune</span>
<span class="text-sm font-bold text-on-surface-variant flex-grow">Custom Number</span>
<input class="w-16 bg-surface-container-lowest border-none rounded-full px-3 py-1 font-bold text-center focus:ring-2 focus:ring-primary-container" placeholder="0" type="number"/>
</div>
</section>
<!-- Layout Visual Decoration -->
<div class="bg-primary/5 rounded-xl p-6 relative overflow-hidden">
<div class="flex items-center gap-4 relative z-10">
<div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="info">info</span>
</div>
<div>
<p class="text-sm font-bold text-on-primary-fixed">Pro Tip</p>
<p class="text-sm text-primary-dim">Standard courses usually have 9 or 18 holes, but Kinetic Fairway lets you build as many as you like.</p>
</div>
</div>
<!-- Asymmetric Decorative Path -->
<div class="absolute -right-10 -bottom-10 w-40 h-40 border-8 border-primary/10 rounded-full"></div>
</div>
</div>
<!-- Next Button -->
<div class="mt-12">
<button class="w-full bg-gradient-to-br from-primary to-primary-dim text-on-primary text-xl font-extrabold py-6 rounded-full flex items-center justify-center gap-3 shadow-[0_12px_40px_rgba(0,106,40,0.25)] hover:scale-[1.02] active:scale-[0.98] transition-all">
                Next: Set Pars
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
<!-- Visual Background Element (Tactile Layering) -->
<div class="fixed top-1/2 left-0 -translate-x-1/2 -translate-y-1/2 -z-10 w-[500px] h-[500px] bg-primary opacity-[0.03] blur-[100px] rounded-full"></div>
<!-- The Shell is suppressed because this is a focused Task Journey -->
<!-- Bottom spacing for mobile comfort -->
<div class="h-20 md:hidden"></div>
</body></html>
